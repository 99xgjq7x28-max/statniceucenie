<!doctype html>
<html lang="sk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#f3efe7">
  <title>Kostry odpovedí – Štátnice</title>
  <link rel="stylesheet" href="styles.css?v=1">
</head>
<body>
  <div class="shell">
    <header class="page-head">
      <div>
        <div class="kicker">Štátnice</div>
        <h1>Kostry odpovedí</h1>
        <p>Krátka hovorená cesta cez každú otázku. Úvod, všetky časti zadania a odkaz na úplnú odpoveď.</p>
      </div>
      <nav aria-label="Navigácia">
        <a class="button-link" href="../index.html">Učenie</a>
        <a class="button-link" href="../plan.html">Plán</a>
      </nav>
    </header>

    <section class="toolbar" aria-label="Filtre">
      <label>
        Predmet
        <select id="subject">
          <option value="all">Všetky</option>
          <option value="Ekonómia a financie">Ekonómia a financie</option>
          <option value="Manažment">Manažment</option>
        </select>
      </label>
      <label>
        Hľadať
        <input id="search" type="search" placeholder="napr. likvidita, motivácia, E25">
      </label>
      <div class="counter"><strong id="count">60</strong><span>kostier</span></div>
    </section>

    <main class="layout">
      <aside class="question-nav">
        <div class="nav-head">
          <strong>Otázky</strong>
          <button id="random" type="button">Náhodná</button>
        </div>
        <div id="list" class="question-list"></div>
      </aside>

      <article id="detail" class="skeleton"></article>
    </main>

    <footer>
      <p><strong>Upozornenie:</strong> Kostry slúžia ako záchytná štruktúra na rozprávanie. Nenahrádzajú úplnú odpoveď ani vlastné overenie poznámok.</p>
    </footer>
  </div>

  <script src="data.js?v=1"></script>
  <script src="app.js?v=1"></script>
</body>
</html>
